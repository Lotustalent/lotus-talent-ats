async function sb(path,method="GET",body=null,prefer="return=representation"){
  const o={method,headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":prefer}};
  if(body)o.body=JSON.stringify(body);
  const r=await fetch(SB_URL+"/rest/v1/"+path,o);
  if(!r.ok){const e=await r.text();throw new Error(e);}
  const t=await r.text();return t?JSON.parse(t):[];
}

const PROMPT="Extract ALL candidate info from this CV and return ONLY a JSON object. Use this structure: {name:'',gender:'',nationality:'',visaStatus:'',visaExpiry:'',email:'',phone:'',location:'',desiredSalary:'',availability:'',noticePeriod:'',currentRole:'',currentCompany:'',languages:[],skills:[],softwareSkills:[],softSkills:[],education:[{degree:'',school:'',year:''}],experience:[{role:'',company:'',start:'',end:'',description:'',reasonLeaving:''}],notes:''} For softwareSkills: tools/software. For softSkills: interpersonal skills. Return ONLY JSON.";
async function rewrite(exp,key){
  if(!key||!exp||!exp.length)return exp;
  const txt=exp.map((e,i)=>"Role "+i+": "+e.role+" at "+e.company+". "+( e.description||"")).join("\n");
  const prompt="Rewrite these job descriptions into 3-5 bullet points each starting with action verbs. Return ONLY JSON array: [{index:0,bullets:['...',...]},...]  Descriptions:\n"+txt;
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:2000,messages:[{role:"user",content:prompt}]})});
  const d=await r.json();
  if(d.error)return exp;
  const raw=(d.content||[]).map(b=>b.text||"").join("").replace(/```json|```/g,"").trim();
  const rewrites=JSON.parse(raw);
  return exp.map((e,i)=>{const rw=rewrites.find(x=>x.index===i);return rw?{...e,bullets:rw.bullets,description:""}:e;});
}

            <F label="Date Opened" type="date" value={jForm.dateOpened} onChange={v=>sJF("dateOpened",v)}/>
          </div>
        </div>
        <div>
          <SH t="Role Details"/>
          <F label="Languages Required" as="textarea" value={jForm.languages||""} onChange={v=>sJF("languages",v)} ph="e.g. Japanese Business" rows={2}/>
          <F label="Job Description" as="textarea" value={jForm.description} onChange={v=>sJF("description",v)} rows={4}/>
          <F label="Requirements" as="textarea" value={jForm.requirements} onChange={v=>sJF("requirements",v)} rows={4}/>
          <F label="Nice to Have" as="textarea" value={jForm.niceToHave} onChange={v=>sJF("niceToHave",v)} rows={2}/>
          <F label="Notes" as="textarea" value={jForm.notes} onChange={v=>sJF("notes",v)} rows={2}/>
        </div>
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:20,paddingTop:16,borderTop:"1px solid "+T.sand}}>
        <Btn v="ghost" onClick={()=>{setView("jobs");setJForm(null);}}>Cancel</Btn>
        <Btn v="success" onClick={saveJob} disabled={saving}>{saving?"Saving...":"Save Job"}</Btn>
      </div>
    </div>}
    {view==="jobDetail"&&selJ&&(()=>{
      const j=jobs.find(x=>x.id===selJ.id)||selJ;
      return <div style={{padding:24,maxWidth:960,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20,flexWrap:"wrap"}}>
          <Btn v="ghost" sm onClick={()=>setView("jobs")}>← Back</Btn>
          <h2 style={{margin:0,fontSize:17,fontWeight:800,color:T.navy}}>{j.title}</h2>
          <Badge s={j.status} map={JSTATUS}/>
          <div style={{marginLeft:"auto"}}><Btn sm onClick={()=>{setJForm({...j});setView("editJ");}}>Edit</Btn></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
          <div style={{background:T.white,borderRadius:10,padding:20,boxShadow:"0 1px 6px rgba(0,0,0,0.07)"}}>
            <SH t="Details"/>
            {[["Job ID",j.jobId],["Client",j.clientName],["Location",j.location],["Contract",j.contractType],["Salary",j.salaryMin||j.salaryMax?j.salaryMin+" – "+j.salaryMax+" gross":"—"],["Start",j.targetStart],["Opened",j.dateOpened]].filter(([,v])=>v).map(([l,v])=><div key={l} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid "+T.sand,fontSize:13}}><span style={{color:T.slate,fontSize:12}}>{l}</span><span style={{fontWeight:600}}>{v}</span></div>)}
          </div>
          <div style={{background:T.white,borderRadius:10,padding:20,boxShadow:"0 1px 6px rgba(0,0,0,0.07)"}}>
            <SH t="Role Info"/>
            {j.benefits&&<div style={{marginBottom:8}}><div style={{fontSize:11,color:T.slate,fontWeight:700}}>BENEFITS</div><div style={{fontSize:12}}>{j.benefits}</div></div>}
            {j.languages&&<div style={{marginBottom:8}}><div style={{fontSize:11,color:T.slate,fontWeight:700}}>LANGUAGES</div><div style={{fontSize:12}}>{j.languages}</div></div>}
            {j.requirements&&<div style={{marginBottom:8}}><div style={{fontSize:11,color:T.slate,fontWeight:700}}>REQUIREMENTS</div><div style={{fontSize:12}}>{j.requirements}</div></div>}
            {j.notes&&<div><div style={{fontSize:11,color:T.slate,fontWeight:700}}>NOTES</div><div style={{fontSize:12}}>{j.notes}</div></div>}
          </div>
        </div>
        <div style={{background:T.white,borderRadius:10,padding:20,boxShadow:"0 1px 6px rgba(0,0,0,0.07)"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:800,color:T.indigo,textTransform:"uppercase"}}>👥 Candidate Pipeline</div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <select id="add-cand-sel" style={{padding:"5px 8px",borderRadius:6,border:"1px solid "+T.sand,fontSize:12,maxWidth:200}}>
                <option value="">— Add candidate —</option>
                {cands.filter(c=>!(j.pipeline||[]).find(p=>p.candidateId===c.id)).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
              <Btn sm onClick={()=>{const sel=document.getElementById("add-cand-sel");const cid=sel?.value;if(!cid){notify("Select a candidate","err");return;}const cand=cands.find(c=>c.id===cid);if(cand){addToPipeline(j.id,cand);sel.value="";};}}>+ Add</Btn>
            </div>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
            {PIPE_STATUSES.map(s=>{const n=(j.pipeline||[]).filter(p=>p.status===s).length;return n>0?<span key={s} style={{background:T.mist,color:T.indigo,borderRadius:20,padding:"2px 8px",fontSize:11,fontWeight:600}}>{s}: {n}</span>:null;})}
          </div>
          {(j.pipeline||[]).length===0&&<div style={{textAlign:"center",padding:"20px 0",color:T.silver,fontSize:13}}>No candidates yet</div>}
          {(j.pipeline||[]).map((p,pi)=><div key={p.candidateId} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:8,border:"1px solid "+T.sand,marginBottom:8,background:T.ivory,flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:100}}><div style={{fontWeight:700,fontSize:13,color:T.navy}}>{p.candidateName}</div><div style={{fontSize:11,color:T.slate}}>{p.addedDate}</div></div>
            <select value={p.status} onChange={e=>updatePipeline(j.id,pi,{status:e.target.value})} style={{padding:"4px 8px",borderRadius:6,border:"1px solid "+T.sand,fontSize:12}}>
              {PIPE_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
            </select>
            <input placeholder="Notes..." value={p.notes||""} onChange={e=>updatePipeline(j.id,pi,{notes:e.target.value})} style={{flex:2,minWidth:100,padding:"4px 8px",borderRadius:6,border:"1px solid "+T.sand,fontSize:12}}/>
            <button onClick={async()=>{const upd={...j,pipeline:j.pipeline.filter((_,i)=>i!==pi)};setJobs(p=>p.map(x=>x.id===j.id?upd:x));setSelJ(upd);try{await saveJ(upd);}catch(e){}}} style={{background:"none",border:"none",cursor:"pointer",color:T.vermil,fontSize:12}}>Remove</button>
          </div>)}
        </div>
      </div>;
    })()}
    {!loading&&view==="clients"&&<div style={{padding:24,maxWidth:1080,margin:"0 auto"}}>
      <div style={{display:"flex",gap:10,marginBottom:16,alignItems:"center"}}>
        <input value={clSearch} onChange={e=>setClSearch(e.target.value)} placeholder="Search clients..." style={{flex:1,minWidth:180,padding:"7px 12px",borderRadius:6,border:"1px solid "+T.sand,fontSize:13,outline:"none"}}/>
        <Btn onClick={()=>{setClForm({id:uid(),status:"Prospect",origin:"Japanese",addedDate:today(),documents:[]});setView("editCL");}}>+ Add Client</Btn>
      </div>
      <div style={{background:T.white,borderRadius:10,overflow:"hidden",boxShadow:"0 1px 6px rgba(0,0,0,0.07)"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
          <thead><tr style={{background:T.navy,color:T.white}}>{["Company","Origin","Contact","Open Roles","Fee","Status","Actions"].map(h=><th key={h} style={{padding:"10px 14px",textAlign:"left",fontSize:11,fontWeight:700}}>{h}</th>)}</tr></thead>
          <tbody>
            {fClients.length===0&&<tr><td colSpan={7} style={{padding:40,textAlign:"center",color:T.slate}}>No clients yet</td></tr>}
            {fClients.map((c,i)=><tr key={c.id} style={{background:i%2===0?T.white:T.ivory,borderBottom:"1px solid "+T.sand}}>
              <td style={{padding:"10px 14px"}}><div style={{fontWeight:700,color:T.navy}}>{c.company}</div><div style={{fontSize:11,color:T.slate}}>{c.industry} · {c.localOffice}</div></td>
              <td style={{padding:"10px 14px"}}>{c.origin}</td>
              <td style={{padding:"10px 14px"}}><div>{c.contactName}</div><div style={{fontSize:11,color:T.slate}}>{c.contactTitle}</div></td>
              <td style={{padding:"10px 14px",fontSize:12,color:T.slate}}>{c.openRoles||"—"}</td>
              <td style={{padding:"10px 14px",fontWeight:600}}>{c.feeAgreed||"—"}</td>
              <td style={{padding:"10px 14px"}}><Badge s={c.status} map={{Active:{bg:"#e8f5ee",tx:"#2a7d4f"},Prospect:{bg:"#e8edf5",tx:"#2d4a8a"},"On Hold":{bg:"#fef3e2",tx:"#8a5a00"},Inactive:{bg:"#f5f5f5",tx:"#5a6480"}}}/></td>
              <td style={{padding:"10px 14px"}}><div style={{display:"flex",gap:6}}>
                <Btn sm v="ghost" onClick={()=>{setClForm({...c});setView("editCL");}}>Edit</Btn>
                <Btn sm onClick={()=>{setSelCl(c);setView("clDetail");}}>View</Btn>
              </div></td>
            </tr>)}
          </tbody>
        </table>
      </div>
    </div>}
    {view==="editCL"&&clForm&&<div style={{padding:24,maxWidth:860,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
        <Btn v="ghost" sm onClick={()=>{setView("clients");setClForm(null);}}>← Back</Btn>
        <h2 style={{margin:0,fontSize:17,fontWeight:800,color:T.navy}}>{clForm.company||"New Client"}</h2>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>
        <div>
          <SH t="Company"/>
          <F label="Company Name *" value={clForm.company} onChange={v=>sCF("company",v)}/>
          <F label="Industry" value={clForm.industry} onChange={v=>sCF("industry",v)}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <F label="Origin" as="select" value={clForm.origin} onChange={v=>sCF("origin",v)} opts={ORIGINS}/>
            <F label="HQ Country" value={clForm.hqCountry} onChange={v=>sCF("hqCountry",v)}/>
          </div>
          <F label="Local Office" value={clForm.localOffice} onChange={v=>sCF("localOffice",v)} ph="Amsterdam"/>
          <F label="Status" as="select" value={clForm.status} onChange={v=>sCF("status",v)} opts={["Active","Prospect","On Hold","Inactive"]}/>
          <SH t="Fee Agreement"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <F label="Fee %" value={clForm.feeAgreed} onChange={v=>sCF("feeAgreed",v)} ph="20%"/>
            <F label="Signed Date" type="date" value={clForm.feeSignedDate} onChange={v=>sCF("feeSignedDate",v)}/>
          </div>
          <F label="Notes" as="textarea" value={clForm.notes} onChange={v=>sCF("notes",v)} rows={4}/>
        </div>
        <div>
          <SH t="Main Contact"/>
          <F label="Contact Name" value={clForm.contactName} onChange={v=>sCF("contactName",v)}/>
          <F label="Title" value={clForm.contactTitle} onChange={v=>sCF("contactTitle",v)} ph="HR Manager"/>
          <F label="Email" type="email" value={clForm.contactEmail} onChange={v=>sCF("contactEmail",v)}/>
          <F label="Phone" value={clForm.contactPhone} onChange={v=>sCF("contactPhone",v)}/>
          <SH t="Open Roles"/>
          <F label="Vacancies" as="textarea" value={clForm.openRoles} onChange={v=>sCF("openRoles",v)} rows={4}/>
        </div>
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:20,paddingTop:16,borderTop:"1px solid "+T.sand}}>
        <Btn v="ghost" onClick={()=>{setView("clients");setClForm(null);}}>Cancel</Btn>
        <Btn v="success" onClick={saveClient} disabled={saving}>{saving?"Saving...":"Save"}</Btn>
      </div>
    </div>}
    {view==="clDetail"&&selCl&&(()=>{
      const cl=clients.find(c=>c.id===selCl.id)||selCl;
      return <div style={{padding:24,maxWidth:900,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
          <Btn v="ghost" sm onClick={()=>setView("clients")}>← Back</Btn>
          <h2 style={{margin:0,fontSize:17,fontWeight:800,color:T.navy}}>{cl.company}</h2>
          <div style={{marginLeft:"auto"}}><Btn sm onClick={()=>{setClForm({...cl});setView("editCL");}}>Edit</Btn></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
          <div style={{background:T.white,borderRadius:10,padding:20,boxShadow:"0 1px 6px rgba(0,0,0,0.07)"}}>
            <SH t="Company"/>
            {[["Industry",cl.industry],["Origin",cl.origin],["HQ",cl.hqCountry],["Office",cl.localOffice],["Fee",cl.feeAgreed],["Signed",cl.feeSignedDate]].filter(([,v])=>v).map(([l,v])=><div key={l} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid "+T.sand,fontSize:13}}><span style={{color:T.slate,fontSize:12}}>{l}</span><span style={{fontWeight:600}}>{v}</span></div>)}
          </div>
          <div style={{background:T.white,borderRadius:10,padding:20,boxShadow:"0 1px 6px rgba(0,0,0,0.07)"}}>
            <SH t="Contact"/>
            {[["Name",cl.contactName],["Title",cl.contactTitle],["Email",cl.contactEmail],["Phone",cl.contactPhone]].filter(([,v])=>v).map(([l,v])=><div key={l} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid "+T.sand,fontSize:13}}><span style={{color:T.slate,fontSize:12}}>{l}</span><span style={{fontWeight:600}}>{v}</span></div>)}
          </div>
        </div>
        {cl.openRoles&&<div style={{background:T.white,borderRadius:10,padding:20,boxShadow:"0 1px 6px rgba(0,0,0,0.07)",marginBottom:16}}>
          <SH t="Open Roles"/>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{cl.openRoles.split("\n").filter(Boolean).map((r,i)=><span key={i} style={{background:T.mist,color:T.indigo,borderRadius:20,padding:"4px 14px",fontSize:12,fontWeight:600}}>{r}</span>)}</div>
        </div>}
        {cl.notes&&<div style={{background:T.white,borderRadius:10,padding:20,boxShadow:"0 1px 6px rgba(0,0,0,0.07)",marginBottom:16}}>
          <SH t="Notes"/><div style={{fontSize:13,color:T.slate,lineHeight:1.7}}>{cl.notes}</div>
        </div>}
        <div style={{background:T.white,borderRadius:10,padding:20,boxShadow:"0 1px 6px rgba(0,0,0,0.07)"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:800,color:T.indigo,textTransform:"uppercase"}}>📎 Documents & Email Log</div>
            <div><input ref={dRef} type="file" style={{display:"none"}} onChange={e=>docUpload(e.target.files[0],cl.id)}/><Btn sm onClick={()=>dRef.current.click()}>+ Upload</Btn></div>
          </div>
          {(cl.documents||[]).length===0&&<div style={{textAlign:"center",padding:"20px 0",color:T.silver,fontSize:13}}>No documents yet</div>}
          {(cl.documents||[]).map(d=><div key={d.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",borderRadius:8,border:"1px solid "+T.sand,marginBottom:8,background:T.ivory}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{fontSize:18}}>{d.type?.includes("pdf")?"📄":"📎"}</div>
              <div><div style={{fontSize:13,fontWeight:600,color:T.navy}}>{d.name}</div><div style={{fontSize:11,color:T.slate}}>{d.date} · {d.size}</div></div>
            </div>
            <div style={{display:"flex",gap:6}}>
              <a href={d.data} download={d.name} style={{textDecoration:"none"}}><Btn sm v="ghost">⬇</Btn></a>
              <Btn sm v="ghost" onClick={()=>delDoc(cl.id,d.id)}>🗑</Btn>
            </div>
          </div>)}
        </div>
      </div>;
    })()}
    {view==="settings"&&<div style={{padding:24,maxWidth:580,margin:"0 auto"}}>
      <h2 style={{color:T.navy,marginBottom:4,fontWeight:800}}>Settings</h2>
      <div style={{background:T.white,borderRadius:10,padding:22,boxShadow:"0 1px 6px rgba(0,0,0,0.07)",marginBottom:16}}>
        <SH t="DB"/>
        <div style={{background:"#e8f5ee",borderRadius:7,padding:"9px 12px",fontSize:12,color:"#1a5c30"}}>✓ Connected to Supabase — data saved permanently</div>
      </div>
      <div style={{background:T.white,borderRadius:10,padding:22,boxShadow:"0 1px 6px rgba(0,0,0,0.07)",marginBottom:16}}>
        <SH t="API Key"/>
        <div style={{background:"#fff8e8",borderRadius:7,padding:"9px 12px",marginBottom:12,fontSize:12,color:"#7a5000",borderLeft:"3px solid "+T.amber}}>Get key at console.anthropic.com (~0.02 per CV)</div>
        <F label="API Key" value={apiKey} onChange={v=>{setApiKey(v);localStorage.setItem("ltc_k",v);}} ph="sk-ant-..."/>
        {apiKey&&<div style={{color:T.green,fontSize:12,fontWeight:600}}>✓ Ready</div>}
      </div>
      <div style={{background:T.white,borderRadius:10,padding:22,boxShadow:"0 1px 6px rgba(0,0,0,0.07)"}}>
        <SH t="Export"/>
        <div style={{display:"flex",gap:10}}>
          <Btn onClick={()=>{const h=["ID","Name","Gender","Nationality","Visa","Salary","Available","Role","Company","Status","Added"];const rows=cands.map(c=>[c.id,c.name,c.gender,c.nationality,c.visaStatus,c.desiredSalary,c.availability,c.currentRole,c.currentCompany,c.status,c.addedDate].map(v=>'"'+(v||"").replace(/"/g,'""')+'"'));const csv=[h,...rows].map(r=>r.join(",")).join("\n");const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="candidates.csv";a.click();}}>⬇ Candidates</Btn>
          <Btn v="ghost" onClick={()=>{const h=["ID","Company","Origin","Contact","Fee","Status"];const rows=clients.map(c=>[c.id,c.company,c.origin,c.contactName,c.feeAgreed,c.status].map(v=>'"'+(v||"").replace(/"/g,'""')+'"'));const csv=[h,...rows].map(r=>r.join(",")).join("\n");const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="clients.csv";a.click();}}>⬇ Clients</Btn>
        </div>
      </div>
    </div>}
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
