async function sbFetch(path, method = "GET", body = null, prefer = "return=representation") {
  const opts = { method, headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY, "Content-Type": "application/json", "Prefer": prefer } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SB_URL + "/rest/v1/" + path, opts);
  if (!res.ok) { const err = await res.text(); throw new Error(err); }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function rewriteExperience(experience, apiKey) {
  if (!apiKey || !experience || experience.length === 0) return experience;
  const expText = experience.map((e, i) => "Role " + (i+1) + ": " + e.role + " at " + e.company + "\nDescription: " + (e.description || "")).join("\n\n");
  const systemMsg = "You are a professional CV writer. Rewrite the work experience descriptions into clear bullet points. Rules: Convert each into 3-5 bullet points starting with action verbs. Fix grammar. Keep facts accurate. Return ONLY a JSON array: [{index:0,bullets:[...]},{index:1,bullets:[...]}]";
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6", max_tokens: 2000,
      messages: [{ role: "user", content: systemMsg + "\n\nExperience to rewrite:\n" + expText }]
    })
  });
  const data = await resp.json();
  if (data.error) return experience;
  const raw = (data.content||[]).map(b => b.text || "").join("").replace(/```json|```/g, "").trim();
  const rewrites = JSON.parse(raw);
  return experience.map((e, i) => {
    const rewrite = rewrites.find(r => r.index === i);
    return rewrite ? { ...e, bullets: rewrite.bullets, description: "" } : e;
  });
}

    setUploading(true);
    try{
      const isPdf=file.type==="application/pdf";
      let extracted;
      if(isPdf){
        const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
        const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:2000,messages:[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:base64}},{type:"text",text:PROMPT}]}]})});
        const data=await resp.json();
        if(data.error)throw new Error(data.error.message);
        extracted=JSON.parse(data.content.map(b=>b.text||"").join("").replace(/```json|```/g,"").trim());
      } else {
        const arrayBuffer=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsArrayBuffer(file);});
        const result=await mammoth.extractRawText({arrayBuffer});
        const cvText=result.value;
        if(!cvText||cvText.trim().length<50)throw new Error("Could not read file");
        const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:2000,messages:[{role:"user",content:`${PROMPT}\n\nCV TEXT:\n${cvText}`}]})});
        const data=await resp.json();
        if(data.error)throw new Error(data.error.message);
        extracted=JSON.parse(data.content.map(b=>b.text||"").join("").replace(/```json|```/g,"").trim());
      }
      setForm({id:uid(),...extracted,status:"New",source:"Upload",addedDate:today()});
      setView("editCandidate");
      notify("CV extracted — please review and save");
    }catch(err){
      console.error(err);

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <Field label="Agreed Fee %" value={clientForm.feeAgreed} onChange={v=>setCF("feeAgreed",v)} placeholder="20%"/>
                <Field label="Agreement Signed Date" type="date" value={clientForm.feeSignedDate} onChange={v=>setCF("feeSignedDate",v)}/>
              </div>
              <SH title="Notes & Relationship"/>
              <Field label="Notes" as="textarea" value={clientForm.notes} onChange={v=>setCF("notes",v)} placeholder="Culture notes, decision process, preferences…" rows={4}/>
            </div>
            <div>
              <SH title="Main Contact Person"/>
              <Field label="Contact Name" value={clientForm.contactName} onChange={v=>setCF("contactName",v)}/>
              <Field label="Job Title" value={clientForm.contactTitle} onChange={v=>setCF("contactTitle",v)} placeholder="HR Manager…"/>
              <Field label="Email" type="email" value={clientForm.contactEmail} onChange={v=>setCF("contactEmail",v)}/>
              <Field label="Phone" value={clientForm.contactPhone} onChange={v=>setCF("contactPhone",v)}/>
              <SH title="Open Roles / Mandates"/>
              <Field label="Active Job Openings" as="textarea" value={clientForm.openRoles} onChange={v=>setCF("openRoles",v)} placeholder={"Marketing Manager\nSales Director"} rows={4}/>
            </div>
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:20,paddingTop:16,borderTop:`1px solid ${T.sand}`}}>
            <Btn variant="ghost" onClick={()=>{setView("clients");setClientForm(null);}}>Cancel</Btn>
            <Btn variant="success" onClick={handleSaveClient} disabled={saving}>{saving?"Saving…":"Save Client"}</Btn>
          </div>
        </div>
      )}

      {/* ── CLIENT DETAIL ── */}
      {view==="clientDetail"&&selectedClient&&(()=>{
        const cl=clients.find(c=>c.id===selectedClient.id)||selectedClient;
        return(
          <div style={{padding:24,maxWidth:900,margin:"0 auto"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
              <Btn variant="ghost" small onClick={()=>setView("clients")}>← Back</Btn>
              <h2 style={{margin:0,fontSize:17,fontWeight:800,color:T.navy}}>{cl.company}</h2>
              <Badge status={cl.status} colors={CLIENT_STATUS_COLORS}/>
              <div style={{marginLeft:"auto"}}><Btn small onClick={()=>{setClientForm({...cl});setView("editClient");}}>Edit</Btn></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:20}}>
              <div style={{background:T.white,borderRadius:10,padding:20,boxShadow:"0 1px 6px rgba(0,0,0,0.07)"}}>
                <SH title="Company"/>
                {[["Industry",cl.industry],["Origin",cl.origin],["HQ Country",cl.hqCountry],["Local Office",cl.localOffice],["Agreed Fee",cl.feeAgreed],["Fee Signed",cl.feeSignedDate]].filter(([,v])=>v).map(([l,v])=>(
                  <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${T.sand}`,fontSize:13}}>
                    <span style={{color:T.slate,fontSize:12}}>{l}</span><span style={{fontWeight:600}}>{v}</span>
                  </div>
                ))}
              </div>
              <div style={{background:T.white,borderRadius:10,padding:20,boxShadow:"0 1px 6px rgba(0,0,0,0.07)"}}>
                <SH title="Main Contact"/>
                {[["Name",cl.contactName],["Title",cl.contactTitle],["Email",cl.contactEmail],["Phone",cl.contactPhone]].filter(([,v])=>v).map(([l,v])=>(
                  <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${T.sand}`,fontSize:13}}>
                    <span style={{color:T.slate,fontSize:12}}>{l}</span><span style={{fontWeight:600}}>{v}</span>
                  </div>
                ))}
              </div>
            </div>
            {cl.openRoles&&<div style={{background:T.white,borderRadius:10,padding:20,boxShadow:"0 1px 6px rgba(0,0,0,0.07)",marginBottom:20}}><SH title="Open Roles / Active Mandates"/><div style={{display:"flex",flexWrap:"wrap",gap:8}}>{cl.openRoles.split("\n").filter(Boolean).map((r,i)=><span key={i} style={{background:T.mist,color:T.indigo,borderRadius:20,padding:"4px 14px",fontSize:12,fontWeight:600}}>{r}</span>)}</div></div>}
            {cl.notes&&<div style={{background:T.white,borderRadius:10,padding:20,boxShadow:"0 1px 6px rgba(0,0,0,0.07)",marginBottom:20}}><SH title="Notes & Relationship"/><div style={{fontSize:13,color:T.slate,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{cl.notes}</div></div>}
            <div style={{background:T.white,borderRadius:10,padding:20,boxShadow:"0 1px 6px rgba(0,0,0,0.07)"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:800,color:T.indigo,textTransform:"uppercase",letterSpacing:"0.1em"}}>📎 Documents & Email Log</div>
                <div><input ref={docRef} type="file" style={{display:"none"}} onChange={e=>handleClientDoc(e.target.files[0],cl.id)}/><Btn small onClick={()=>docRef.current.click()}>+ Upload</Btn></div>
              </div>
              <div style={{fontSize:12,color:T.slate,marginBottom:12,background:T.mist,borderRadius:6,padding:"8px 12px"}}>Upload emails (as PDF), contracts, proposals, or any correspondence. Stored as backup log.</div>
              {(!cl.documents||cl.documents.length===0)&&<div style={{textAlign:"center",padding:"24px 0",color:T.silver,fontSize:13}}>No documents yet</div>}
              {(cl.documents||[]).map(doc=>(
                <div key={doc.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",borderRadius:8,border:`1px solid ${T.sand}`,marginBottom:8,background:T.ivory}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{fontSize:20}}>{doc.type?.includes("pdf")?"📄":doc.type?.includes("image")?"🖼️":"📎"}</div>
                    <div><div style={{fontSize:13,fontWeight:600,color:T.navy}}>{doc.name}</div><div style={{fontSize:11,color:T.slate}}>{doc.date} · {doc.size}</div></div>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <a href={doc.data} download={doc.name} style={{textDecoration:"none"}}><Btn small variant="ghost">⬇</Btn></a>
                    <Btn small variant="ghost" onClick={()=>deleteDoc(cl.id,doc.id)}>🗑</Btn>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {/* ── SETTINGS ── */}
      {view==="settings"&&(
        <div style={{padding:24,maxWidth:580,margin:"0 auto"}}>
          <h2 style={{color:T.navy,marginBottom:4,fontWeight:800}}>Settings</h2>
          <p style={{color:T.slate,fontSize:13,marginBottom:20}}>Configure AI extraction and export.</p>
          <div style={{background:T.white,borderRadius:10,padding:22,boxShadow:"0 1px 6px rgba(0,0,0,0.07)",marginBottom:16}}>
            <SH title="🗄 Database"/>
            <div style={{background:"#e8f5ee",borderRadius:7,padding:"9px 12px",fontSize:12,color:"#1a5c30",lineHeight:1.6}}>
              ✓ Connected to Supabase — all data is saved permanently and synced across devices.
            </div>
          </div>
          <div style={{background:T.white,borderRadius:10,padding:22,boxShadow:"0 1px 6px rgba(0,0,0,0.07)",marginBottom:16}}>
            <SH title="🤖 Anthropic API Key (Required for CV extraction)"/>
            <div style={{background:"#fff8e8",borderRadius:7,padding:"9px 12px",marginBottom:12,fontSize:12,color:"#7a5000",lineHeight:1.6,borderLeft:`3px solid ${T.amber}`}}>
              Get your key at <a href="https://console.anthropic.com" target="_blank" rel="noreferrer" style={{color:T.indigo}}>console.anthropic.com</a>. ~€0.02 per CV. Saved in your browser.
            </div>
            <Field label="API Key" value={apiKey} onChange={v=>{setApiKey(v);localStorage.setItem("ltc_api_key",v);}} placeholder="sk-ant-..."/>
            {apiKey&&<div style={{color:T.green,fontSize:12,fontWeight:600}}>✓ API key set — CV extraction ready</div>}
          </div>
          <div style={{background:T.white,borderRadius:10,padding:22,boxShadow:"0 1px 6px rgba(0,0,0,0.07)",marginBottom:16}}>
            <SH title="⬇ Export Data"/>
            <p style={{color:T.slate,fontSize:12,marginBottom:12}}>Download candidates or clients as CSV.</p>
            <div style={{display:"flex",gap:10}}>
              <Btn onClick={()=>{
                const h=["ID","Name","Gender","Nationality","Visa","Salary","Available","Role","Company","Email","Phone","Location","Status","Source","Added","Languages","Skills","Notes"];
                const rows=candidates.map(c=>[c.id,c.name,c.gender,c.nationality,c.visaStatus,c.desiredSalary,c.availability,c.currentRole,c.currentCompany,c.email,c.phone,c.location,c.status,c.source,c.addedDate,(c.languages||[]).join("; "),(c.skills||[]).join("; "),c.notes].map(v=>`"${(v||"").replace(/"/g,'""')}"`));
                const csv=[h,...rows].map(r=>r.join(",")).join("\n");
                const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="lotus_candidates.csv";a.click();
              }}>⬇ Candidates CSV</Btn>
              <Btn variant="ghost" onClick={()=>{
                const h=["ID","Company","Industry","Origin","HQ","Office","Status","Fee","Signed","Contact","Title","Email","Phone","Open Roles","Notes","Added"];
                const rows=clients.map(c=>[c.id,c.company,c.industry,c.origin,c.hqCountry,c.localOffice,c.status,c.feeAgreed,c.feeSignedDate,c.contactName,c.contactTitle,c.contactEmail,c.contactPhone,c.openRoles,c.notes,c.addedDate].map(v=>`"${(v||"").replace(/"/g,'""')}"`));
                const csv=[h,...rows].map(r=>r.join(",")).join("\n");
                const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="lotus_clients.csv";a.click();
              }}>⬇ Clients CSV</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
